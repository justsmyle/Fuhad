
<html>
<head>
  <title>Password Generator | 4AM Dev</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { 
      font-family: Arial; 
      background: #0f172a; 
      color: #e2e8f0; 
      text-align: center; 
      padding: 40px 20px; 
    }
    .box { 
      background: #1e293b; 
      max-width: 400px; 
      margin: 0 auto; 
      padding: 30px; 
      border-radius: 12px; 
      border: 1px solid #334155;
    }
    h1 { color: #22d3ee; margin-bottom: 20px; }
    #password { 
      background: #0f172a; 
      padding: 15px; 
      border-radius: 8px; 
      font-family: monospace; 
      font-size: 18px;
      margin: 20px 0; 
      word-break: break-all;
      border: 1px solid #334155;
    }
    input[type="range"] { width: 80%; margin: 15px 0; }
    button { 
      background: #22d3ee; 
      color: #0f172a; 
      border: none; 
      padding: 12px 24px; 
      border-radius: 8px; 
      font-weight: bold; 
      cursor: pointer; 
      margin: 5px;
    }
    button:hover { background: #06b6d4; }
    label { display: block; margin: 10px 0 5px; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Þ Password Generator</h1>
    
    <div id="password">Click Generate</div>
    
    <label>Length: <span id="length">16</span></label>
    <input type="range" id="slider" min="8" max="32" value="16">
    
    <br>
    <button onclick="generate()">Generate</button>
    <button onclick="copyPass()">Copy</button>
    
    <p style="font-size:12px; opacity:0.6; margin-top:20px;">
      Built at 04:33am by Fuhad
    </p>
  </div>

  <script>
    const slider = document.getElementById('slider');
    const lengthSpan = document.getElementById('length');
    const passDiv = document.getElementById('password');
    
    slider.oninput = () => {
      lengthSpan.textContent = slider.value;
    }
    
    function generate() {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*';
      let pass = '';
      for(let i = 0; i < slider.value; i++) {
        pass += chars[Math.floor(Math.random() * chars.length)];
      }
      passDiv.textContent = pass;
    }
    
    function copyPass() {
      navigator.clipboard.writeText(passDiv.textContent);
      alert('Copied! Þ');
    }
    
    generate(); // Generate one on load
  </script>
</body>
</html>
